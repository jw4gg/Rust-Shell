name: Release Rust Shell

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: Rust-Shell
            asset_name: Rust-Shell-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: Rust-Shell
            asset_name: Rust-Shell-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: Rust-Shell.exe
            asset_name: Rust-Shell-windows-amd64.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build Binary (Release Mode)
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package Assets
      shell: bash
      run: |
        mkdir dist
        # Copy the compiled binary from the target folder to our distribution folder
        cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
