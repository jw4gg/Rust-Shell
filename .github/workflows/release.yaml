name: Release Rust Shell

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Job 1: Build on all OS platforms in parallel
  build:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: Rust-Shell
            asset_name: Rust-Shell-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: Rust-Shell
            asset_name: Rust-Shell-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: Rust-Shell.exe
            asset_name: Rust-Shell-windows-amd64.exe
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build Binary (Release Mode)
      run: cargo build --release --target ${{ matrix.target }}

    - name: Rename Asset
      shell: bash
      run: |
        mkdir dist
        cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

    # Temporarily save the binary inside the workflow run
    - name: Upload intermediate artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.asset_name }}

  # Job 2: Run ONCE to collect everything and make one single GitHub Release
  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all built binaries
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
